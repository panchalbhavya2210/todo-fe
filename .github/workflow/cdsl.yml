name: CDSL Data Updater

on:
  schedule:
    - cron: "0 3 */15 * *"   
  workflow_dispatch:         

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape:cdsl

      - name: Commit updated JSON
        run: |
          git config user.name "cdsl-bot"
          git config user.email "bot@users.noreply.github.com"

          git add cdsl-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update CDSL data"
          git push
